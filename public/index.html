<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeySprint - Typing Speed Trainer</title>
<link rel="stylesheet" href="styles.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<!-- Header -->
<header class="header">

<div class="logo">
<span class="logo-icon">⚡</span>
<span class="logo-text">KeySprint</span>
</div>

<nav class="nav">
<button class="nav-btn" id="settingsBtn">

<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

<circle cx="12" cy="12" r="3"></circle>
<path d="M12 1v6m0 6v6m0-12a9 9 0 0 1 9 9m-9-9a9 9 0 0 0-9 9m9 3a9 9 0 0 1-9-9m9 9a9 9 0 0 0 9-9"></path>

</svg>

</button>
</nav>

</header>


<!-- Settings Panel -->
<div class="settings-panel" id="settingsPanel">

<div class="settings-section">
<h3>Theme</h3>

<div class="theme-options">
<button class="theme-btn active" data-theme="dark">Dark</button>
<button class="theme-btn" data-theme="light">Light</button>
<button class="theme-btn" data-theme="serika">Serika</button>
<button class="theme-btn" data-theme="dracula">Dracula</button>
</div>

</div>


<div class="settings-section">
<h3>Options</h3>

<label class="checkbox-label">
<input type="checkbox" id="punctuationToggle">
<span>Punctuation</span>
</label>

<label class="checkbox-label">
<input type="checkbox" id="numbersToggle">
<span>Numbers</span>
</label>

<label class="checkbox-label">
<input type="checkbox" id="soundToggle" checked>
<span>Sound</span>
</label>

</div>

</div>


<!-- Main Content -->
<main class="main-content">

<h2 class="tagline">Improve your typing speed with precision ⚡</h2>


<!-- Test Config -->
<div class="test-config" id="testConfig">

<div class="mode-selector">
<button class="mode-btn" data-mode="time">time</button>
<button class="mode-btn active" data-mode="words">words</button>
</div>

<div class="config-options" id="configOptions">

<button class="config-btn" data-value="10">10</button>
<button class="config-btn active" data-value="25">25</button>
<button class="config-btn" data-value="50">50</button>
<button class="config-btn" data-value="100">100</button>

</div>

</div>


<!-- Typing Test Area -->
<div class="typing-area" id="typingArea">

<div class="timer" id="timer"></div>

<div class="words" id="words"></div>

<input type="text"
class="hidden-input"
id="typingInput"
autocomplete="off"
autocapitalize="off"
autocorrect="off">

</div>


<!-- Results -->
<div class="results hidden" id="results">

<div class="results-stats">

<div class="stat-primary">
<div class="stat-value" id="finalWpm">0</div>
<div class="stat-label">wpm</div>
</div>

<div class="stat-secondary">

<div class="stat-item">
<div class="stat-value" id="finalAccuracy">0%</div>
<div class="stat-label">accuracy</div>
</div>

<div class="stat-item">
<div class="stat-value" id="finalRaw">0</div>
<div class="stat-label">raw</div>
</div>

<div class="stat-item">
<div class="stat-value" id="finalConsistency">0%</div>
<div class="stat-label">consistency</div>
</div>

</div>

</div>


<div class="char-stats">
<div class="char-stat">
<span class="char-label">characters</span>
<span class="char-value">
<span id="correctChars">0</span> /
<span id="incorrectChars">0</span> /
<span id="extraChars">0</span> /
<span id="missedChars">0</span>
</span>
</div>
</div>


<button class="restart-btn" id="restartBtn">

<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

<path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"></path>

</svg>

restart

</button>

</div>


<!-- Live Stats -->
<div class="live-stats" id="liveStats">

<div class="stat">
<span class="stat-label">wpm</span>
<span class="stat-value" id="liveWpm">0</span>
</div>

<div class="stat">
<span class="stat-label">accuracy</span>
<span class="stat-value" id="liveAccuracy">100%</span>
</div>

<div class="stat">
<span class="stat-label">raw</span>
<span class="stat-value" id="liveRaw">0</span>
</div>

</div>

</main>


<!-- Footer -->
<footer class="footer">

<div class="footer-links">

<a href="#" class="footer-link">About</a>

<a href="https://github.com/HP-69" class="footer-link">GitHub</a>

</div>



</footer>

</div>


<script src="words.js"></script>
<script src="app.js"></script>

</body>
</html>
